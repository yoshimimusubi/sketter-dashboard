<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>進捗管理ダッシュボード</title>
    <meta name="description" content="医療・福祉機関向け 進捗管理＆AI挽回プラン提案ダッシュボード">
    <style>
        /* リセット */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Noto Sans JP', 'Hiragino Sans', sans-serif;
            background: #F8FAFC;
        }

        /* iframe を画面いっぱいに表示 */
        .dashboard-frame {
            width: 100%;
            height: 100vh;
            border: none;
            display: block;
        }

        /* 読み込み中のプレースホルダー */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #FFFFFF;
            z-index: 10;
            transition: opacity 0.4s ease;
        }

        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #E2E8F0;
            border-top-color: #0047AB;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .loading-text {
            margin-top: 1rem;
            color: #64748B;
            font-size: 0.9rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- 読み込み中表示 -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <p class="loading-text">ダッシュボードを読み込み中...</p>
    </div>

    <!-- ダッシュボード埋め込み -->
    <!-- ★ 下記URLをStreamlit Cloudで発行されたURLに差し替えてください ★ -->
    <iframe
        src="https://your-app-name.streamlit.app/?embedded=true"
        class="dashboard-frame"
        id="dashboardFrame"
        allow="clipboard-write"
        loading="lazy"
        onload="document.getElementById('loadingOverlay').classList.add('hidden')"
    ></iframe>
</body>
</html>
